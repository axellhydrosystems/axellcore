name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets
        run: npm ci && npm run build

      - name: Build plugin zip
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p /tmp/build

          git archive HEAD --prefix=axellcore/ | tar xf - -C /tmp/build/

          git -C lib/selfdirectory archive HEAD \
            --prefix=axellcore/lib/selfdirectory/ \
            -- class-selfdirectory.php \
            | tar xf - -C /tmp/build/

          # Copy compiled assets (generated — not tracked in git, not in archive).
          cp assets/js/admin/post-ordering.js /tmp/build/axellcore/assets/js/admin/
          cp assets/css/admin/post-ordering.css /tmp/build/axellcore/assets/css/admin/

          cd /tmp/build && zip -r "axellcore.${tag}.zip" axellcore
          echo "zip=/tmp/build/axellcore.${tag}.zip" >> "$GITHUB_OUTPUT"
        id: build

      - name: Upload plugin zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip }}
          generate_release_notes: true
