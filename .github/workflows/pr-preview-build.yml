name: PR Preview - Build
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
jobs:
  build:
    uses: WordPress/action-wp-playground-pr-preview/.github/workflows/preview-build.yml@v3
    with:
      artifacts: plugin-zip=build/axellcore.zip
      build-command: |
        git submodule update --init --recursive
        npm ci
        npm run build
        mkdir -p build
        git archive HEAD --prefix=axellcore/ | tar xf - -C build/
        git -C lib/selfdirectory archive HEAD \
          --prefix=axellcore/lib/selfdirectory/ \
          -- class-selfdirectory.php \
          | tar xf - -C build/
        cp assets/js/admin/post-ordering.js build/axellcore/assets/js/admin/
        cp assets/css/admin/post-ordering.css build/axellcore/assets/css/admin/
        rm -f build/axellcore/assets/js/admin/post-ordering.ts
        rm -f build/axellcore/assets/css/admin/post-ordering.scss
        rm -f build/axellcore/tsconfig.json
        (cd build && zip -r axellcore.zip axellcore)
